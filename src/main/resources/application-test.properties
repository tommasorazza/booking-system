# Test profile — replaces the real datasource with H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable the DataInitializer so tests control their own data
spring.autoconfigure.exclude=

# JWT config (short-lived secret for tests — 64+ chars for HS256)
jwt.secret=test-secret-key-that-is-long-enough-for-hs256-algorithm-padding
jwt.expiration=3600000